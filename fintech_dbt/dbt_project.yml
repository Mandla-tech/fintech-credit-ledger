name: 'fintech_dbt'
version: '1.0.0'


# This setting configures which "profile" dbt uses
profile: 'fintech_dbt'

# configurations specify where dbt should look for different types of files.
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:         # directories to be removed by `dbt clean`
  - "target"
  - "dbt_packages"


# In this config, dbt builds all models
models:
  fintech_dbt:
    silver:
      +materialized: table
      +contract:
        enforced: true
    gold:
      +materialized: table
      +contract:
        enforced: true
     